name: nyc-taxi-ml
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      # Core data
      - pandas>=2.0
      - numpy>=1.24
      - pyarrow>=12.0
      - fastparquet

      # Machine learning
      - scikit-learn>=1.3
      - xgboost>=2.0
      - lightgbm>=4.0

      # Visualization
      - matplotlib>=3.7
      - seaborn>=0.12
      - plotly>=5.15

      # MLOps & experiment tracking
      - mlflow>=2.8

      # Model serving
      - fastapi>=0.104
      - uvicorn[standard]>=0.24
      - pydantic>=2.0

      # Explainability & drift detection
      - shap>=0.43
      - evidently>=0.4
      - scipy>=1.11

      # Scheduling & HTTP
      - schedule>=1.2
      - requests>=2.31

      # Config
      - pyyaml>=6.0

      # Notebook support
      - ipykernel
      - jupyter

      # Testing
      - pytest>=7.4
      - httpx>=0.25        # required by fastapi TestClient
